<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restaurant Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --accent: #E8553E;
    --bg: #0f0f13;
    --bg2: #1a1a24;
    --border: rgba(255,255,255,0.08);
    --text: rgba(255,255,255,0.88);
    --muted: rgba(255,255,255,0.35);
    --green: #25D366;
  }
  body {
    min-height: 100vh;
    background: linear-gradient(135deg, var(--bg) 0%, var(--bg2) 50%, var(--bg) 100%);
    font-family: 'DM Sans', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
    gap: 20px;
    color: var(--text);
  }
  .header { text-align: center; }
  .eyebrow { font-size: 11px; letter-spacing: 3px; color: var(--accent); text-transform: uppercase; margin-bottom: 8px; font-weight: 500; }
  h1 { font-family: 'Playfair Display', serif; font-size: clamp(22px, 5vw, 30px); font-weight: 600; color: #fff; }
  .chat-window { width: 100%; max-width: 420px; background: rgba(255,255,255,0.03); border-radius: 24px; border: 1px solid var(--border); overflow: hidden; box-shadow: 0 40px 80px rgba(0,0,0,0.4); }
  .chat-header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; background: rgba(232,85,62,0.08); }
  .avatar { width: 42px; height: 42px; border-radius: 14px; background: rgba(232,85,62,0.15); border: 1px solid rgba(232,85,62,0.4); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .biz-name { color: #fff; font-weight: 600; font-size: 14px; }
  .status { display: flex; align-items: center; gap: 5px; margin-top: 2px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: #4ade80; }
  .status span { color: var(--muted); font-size: 11px; }
  .messages { height: 360px; overflow-y: auto; padding: 18px; display: flex; flex-direction: column; gap: 10px; scrollbar-width: none; }
  .messages::-webkit-scrollbar { display: none; }
  .msg { display: flex; animation: fadeUp 0.3s ease; }
  .msg.user { justify-content: flex-end; }
  .bubble { max-width: 82%; padding: 10px 14px; font-size: 13.5px; line-height: 1.5; }
  .bubble.user { background: linear-gradient(135deg, var(--accent), rgba(232,85,62,0.8)); color: #fff; border-radius: 18px 18px 4px 18px; font-weight: 500; }
  .bubble.bot { background: rgba(255,255,255,0.07); color: var(--text); border-radius: 18px 18px 18px 4px; border: 1px solid var(--border); }
  .booking-card { background: rgba(37,211,102,0.07); border: 1px solid rgba(37,211,102,0.25); border-radius: 16px; padding: 14px; max-width: 88%; animation: fadeUp 0.4s ease; }
  .booking-title { font-size: 11px; color: var(--green); font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 10px; }
  .booking-detail { display: flex; justify-content: space-between; font-size: 12.5px; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .booking-detail:last-of-type { border-bottom: none; }
  .booking-detail span:first-child { color: var(--muted); }
  .booking-detail span:last-child { font-weight: 500; }
  .booking-status { margin-top: 10px; padding: 8px 12px; border-radius: 10px; font-size: 12px; font-weight: 600; text-align: center; }
  .booking-status.success { background: rgba(37,211,102,0.15); color: var(--green); }
  .booking-status.pending { background: rgba(255,200,0,0.15); color: #ffc800; }
  .typing { display: flex; animation: fadeUp 0.3s ease; }
  .typing-inner { padding: 12px 16px; border-radius: 18px 18px 18px 4px; background: rgba(255,255,255,0.07); border: 1px solid var(--border); display: flex; gap: 4px; align-items: center; }
  .typing-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: bounce 1.2s ease-in-out infinite; }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  .suggestions { display: flex; gap: 6px; flex-wrap: wrap; padding: 0 18px 14px; }
  .suggestion { padding: 5px 10px; border-radius: 20px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--muted); font-size: 11px; cursor: pointer; transition: all 0.2s; font-family: 'DM Sans', sans-serif; }
  .suggestion:hover { background: rgba(232,85,62,0.12); border-color: rgba(232,85,62,0.3); color: var(--accent); }
  .chat-input { padding: 12px 14px; border-top: 1px solid var(--border); display: flex; gap: 8px; align-items: center; background: rgba(0,0,0,0.2); }
  input[type=text] { flex: 1; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; padding: 10px 14px; color: #fff; font-size: 13px; outline: none; font-family: 'DM Sans', sans-serif; }
  input[type=text]:focus { border-color: rgba(232,85,62,0.5); }
  input[type=text]::placeholder { color: rgba(255,255,255,0.22); }
  .send-btn { width: 40px; height: 40px; border-radius: 12px; border: none; background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.2); font-size: 16px; cursor: default; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
  .send-btn.active { background: var(--accent); color: #fff; cursor: pointer; }
  .auth-banner { background: rgba(232,85,62,0.1); border: 1px solid rgba(232,85,62,0.3); border-radius: 16px; padding: 16px; width: 100%; max-width: 420px; text-align: center; }
  .auth-btn { display: inline-block; margin-top: 10px; padding: 10px 20px; background: var(--accent); color: #fff; border-radius: 12px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; font-family: 'DM Sans', sans-serif; }
  @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div class="header">
  <div class="eyebrow">AI Table Booking</div>
  <h1 id="bizTitle">Restaurant Assistant</h1>
</div>

<div class="auth-banner" id="authBanner" style="display:none">
  <div style="color:#fff;font-weight:600;margin-bottom:4px">📅 Connect Google Calendar</div>
  <div style="color:var(--muted);font-size:12px">The owner needs to connect their Google Calendar once to enable live bookings.</div>
  <button class="auth-btn" onclick="connectCalendar()">Connect Calendar</button>
</div>

<div class="chat-window">
  <div class="chat-header">
    <div class="avatar">🍝</div>
    <div>
      <div class="biz-name" id="bizName">Loading...</div>
      <div class="status"><div class="dot"></div><span>Online · Booking available</span></div>
    </div>
  </div>
  <div class="messages" id="messages"></div>
  <div class="suggestions" id="suggestions"></div>
  <div class="chat-input">
    <input type="text" id="userInput" placeholder="Type a message..." />
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">↑</button>
  </div>
</div>

<script>
let messages = [];
let loading = false;
let calendarConnected = false;
let config = {};

async function loadConfig() {
  try {
    const res = await fetch('/api/config');
    config = await res.json();
    document.getElementById('bizTitle').textContent = config.businessName;
    document.getElementById('bizName').textContent = config.businessName;
    calendarConnected = config.calendarConnected;
    if (!calendarConnected) {
      document.getElementById('authBanner').style.display = 'block';
    }
    init();
  } catch(e) {
    config = { businessName: 'Our Restaurant' };
    init();
  }
}

function init() {
  const suggestions = ['Book a table', 'What are your opening hours?', 'Where are you located?'];
  const sugEl = document.getElementById('suggestions');
  suggestions.forEach(s => {
    const chip = document.createElement('button');
    chip.className = 'suggestion';
    chip.textContent = s;
    chip.onclick = () => { document.getElementById('userInput').value = s; updateBtn(); sendMessage(); };
    sugEl.appendChild(chip);
  });
  addBotMessage(`Welcome to <strong>${config.businessName || 'our restaurant'}</strong>! 👋 How can I help you today?`);
}

function addBotMessage(html) {
  messages.push({ role: 'assistant', content: html.replace(/<[^>]+>/g, '') });
  const el = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg bot';
  const bubble = document.createElement('div');
  bubble.className = 'bubble bot';
  bubble.innerHTML = html;
  div.appendChild(bubble);
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

function addUserMessage(text) {
  messages.push({ role: 'user', content: text });
  const el = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg user';
  const bubble = document.createElement('div');
  bubble.className = 'bubble user';
  bubble.textContent = text;
  div.appendChild(bubble);
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

function showBookingCard(booking, status) {
  const el = document.getElementById('messages');
  const card = document.createElement('div');
  card.className = 'booking-card';
  const statusText = status === 'confirmed'
    ? '<div class="booking-status success">✅ Added to Google Calendar</div>'
    : '<div class="booking-status pending">⏳ Booking request sent</div>';
  card.innerHTML = `
    <div class="booking-title">📅 Booking Summary</div>
    <div class="booking-detail"><span>Name</span><span>${booking.name}</span></div>
    <div class="booking-detail"><span>Guests</span><span>${booking.guests}</span></div>
    <div class="booking-detail"><span>Date</span><span>${booking.date}</span></div>
    <div class="booking-detail"><span>Time</span><span>${booking.time}</span></div>
    ${statusText}
  `;
  el.appendChild(card);
  el.scrollTop = el.scrollHeight;
}

function showTyping() {
  const el = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'typing'; div.id = 'typing-indicator';
  div.innerHTML = `<div class="typing-inner"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
  el.appendChild(div); el.scrollTop = el.scrollHeight;
}

function removeTyping() { const el = document.getElementById('typing-indicator'); if (el) el.remove(); }

function updateBtn() {
  const val = document.getElementById('userInput').value.trim();
  document.getElementById('sendBtn').classList.toggle('active', val.length > 0);
}

document.getElementById('userInput').addEventListener('input', updateBtn);
document.getElementById('userInput').addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

async function sendMessage() {
  if (loading) return;
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = ''; updateBtn();
  addUserMessage(text);
  loading = true; showTyping();
  document.getElementById('suggestions').style.display = 'none';

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages, calendarConnected })
    });
    const data = await res.json();
    removeTyping();

    if (data.booking) {
      addBotMessage("Perfect! Let me check the calendar and confirm your table 👇");
      const bookingRes = await fetch('/api/book', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data.booking)
      });
      const bookingData = await bookingRes.json();
      if (bookingData.success) {
        showBookingCard(data.booking, 'confirmed');
        addBotMessage(`All done! Your table is confirmed for ${data.booking.date} at ${data.booking.time}. See you then! 🎉`);
        messages.push({ role: 'assistant', content: `Booking confirmed for ${data.booking.name} on ${data.booking.date} at ${data.booking.time}.` });
      } else if (bookingData.suggestedSlot) {
        showBookingCard({ ...data.booking, time: bookingData.suggestedSlot }, 'confirmed');
        addBotMessage(`That exact time was taken, but I've booked you in at <strong>${bookingData.suggestedSlot}</strong> instead — the next available slot. See you then! 🎉`);
        messages.push({ role: 'assistant', content: `Booking confirmed at alternative time ${bookingData.suggestedSlot}.` });
      } else {
        addBotMessage("Sorry, I couldn't find a free slot around that time. Could you suggest another time?");
        messages.push({ role: 'assistant', content: 'No available slots found around that time.' });
      }
    } else {
      addBotMessage(data.reply);
      messages.push({ role: 'assistant', content: data.reply });
    }
  } catch(e) {
    removeTyping();
    addBotMessage('Sorry, something went wrong. Please try again.');
  }
  loading = false;
  input.focus();
}

function connectCalendar() {
  window.location.href = '/api/auth';
}

loadConfig();
</script>
</body>
</html>
